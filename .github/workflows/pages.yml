name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Build and deploy are split into two jobs on purpose: the artifact is
  # uploaded only in `build`, so re-running a failed `deploy` never uploads a
  # second `github-pages` artifact (which would fail with "Multiple artifacts
  # named github-pages were unexpectedly found for this workflow run").
  build:
    runs-on: ubuntu-latest
    env:
      PAGES_TOKEN: ${{ secrets.PAGES_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        if: ${{ env.PAGES_TOKEN == '' }}
        uses: actions/configure-pages@v5

      - name: Configure Pages and enable site
        if: ${{ env.PAGES_TOKEN != '' }}
        uses: actions/configure-pages@v5
        with:
          enablement: true
          token: ${{ secrets.PAGES_TOKEN }}

      # Ship only the site itself — not .git, .github, README, or LICENSE.
      # A smaller artifact deploys faster and is less prone to the Pages
      # backend timing out.
      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r .nojekyll index.html style.css sw.js manifest.webmanifest icons js _site/

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
